# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/eco-match-db}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:eco-match-db}

# Server Configuration
server.port=${PORT:8080}

# Optional: Logging for debugging
logging.level.org.springframework=INFO
logging.level.com.ecomatch=DEBUG

# Waste Detection Model Server Configuration
waste.detection.server.url=${WASTE_DETECTION_SERVER_URL:http://localhost:8000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
