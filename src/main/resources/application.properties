# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/eco-match-db
spring.data.mongodb.database=eco-match-db

# Server Configuration
server.port=8080

# Optional: Logging for debugging
logging.level.org.springframework=INFO
logging.level.com.ecomatch=DEBUG

# Waste Detection Model Server Configuration
waste.detection.server.url=http://localhost:8000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration (if needed for frontend integration)
